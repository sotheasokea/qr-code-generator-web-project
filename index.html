<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gen QR x Gen Z</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="input-section">
        <h1>Gen QR x Gen Z</h1>
        <input type="text" placeholder="https://anylinktogenerateQRcode" />
        <button class="generate-btn">Generate</button>
      </div>
      <div class="qr-section">
        <div class="qr-container">
          <img src="image/fake-qr.png" alt="QR Code" class="generated-qr" loading="eager" decoding="async" />
        </div>
        <!-- <div class="button-container"> -->
        <button class="download-btn">
          <img src="image/download-icon.png" alt="" />
          Download
        </button>
        <!-- <button class="share-btn">
            <img src="/image/share-icon.png" alt="" />
            Share
          </button> -->
        <!-- </div> -->
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
